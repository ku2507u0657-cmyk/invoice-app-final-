{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Generate New Bill</h2>
    
    <form action="{{ url_for('billing.create_bill') }}" method="POST" id="billForm">
        <div class="row mb-4">
            <div class="col-md-6">
                <label class="form-label fw-bold">Select Client *</label>
                <select name="client_id" class="form-select" required>
                    <option value="">-- Choose Client --</option>
                    {% for client in clients %}
                    <option value="{{ client.id }}">{{ client.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover" id="billingTable">
                <thead class="table-light">
                    <tr>
                        <th>Item Name / Description</th>
                        <th width="150">Quantity</th>
                        <th width="200">MRP (₹)</th>
                        <th width="200">Total (₹)</th>
                        <th width="80">Action</th>
                    </tr>
                </thead>
                <tbody id="itemsBody">
                    <tr>
                        <td><input type="text" name="item_name[]" class="form-control" placeholder="E.g. Web Hosting" required></td>
                        <td><input type="number" name="quantity[]" class="form-control qty" value="1" min="1" required></td>
                        <td><input type="number" name="mrp[]" class="form-control mrp" value="0" min="0" step="0.01" required></td>
                        <td><input type="text" class="form-control row-total" value="0.00" readonly></td>
                        <td><button type="button" class="btn btn-danger btn-sm remove-row" disabled><i class="bi bi-x-lg">X</i></button></td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <button type="button" class="btn btn-outline-primary btn-sm mb-4" id="addRowBtn">+ Add New Item</button>

        <div class="row justify-content-end text-end">
            <div class="col-md-4 card p-3 shadow-sm">
                <h4 class="mb-3">Grand Total: <span id="grandTotal" class="text-success">₹0.00</span></h4>
                <button type="submit" class="btn btn-dark w-100 fs-5">Generate Bill</button>
            </div>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const itemsBody = document.getElementById('itemsBody');
    
    // 1. ADD NEW ROW
    document.getElementById('addRowBtn').addEventListener('click', function() {
        const newRow = document.createElement('tr');
        newRow.innerHTML = `
            <td><input type="text" name="item_name[]" class="form-control" placeholder="E.g. Domain Name" required></td>
            <td><input type="number" name="quantity[]" class="form-control qty" value="1" min="1" required></td>
            <td><input type="number" name="mrp[]" class="form-control mrp" value="0" min="0" step="0.01" required></td>
            <td><input type="text" class="form-control row-total" value="0.00" readonly></td>
            <td><button type="button" class="btn btn-danger btn-sm remove-row">X</button></td>
        `;
        itemsBody.appendChild(newRow);
    });

    // 2. AUTO-CALCULATE ON TYPING (Event Delegation)
    itemsBody.addEventListener('input', function(e) {
        if (e.target.classList.contains('qty') || e.target.classList.contains('mrp')) {
            const row = e.target.closest('tr');
            const qty = parseFloat(row.querySelector('.qty').value) || 0;
            const mrp = parseFloat(row.querySelector('.mrp').value) || 0;
            
            row.querySelector('.row-total').value = (qty * mrp).toFixed(2);
            calculateGrandTotal();
        }
    });

    // 3. REMOVE ROW
    itemsBody.addEventListener('click', function(e) {
        if (e.target.classList.contains('remove-row')) {
            e.target.closest('tr').remove();
            calculateGrandTotal();
        }
    });

    // 4. UPDATE GRAND TOTAL
    function calculateGrandTotal() {
        let total = 0;
        document.querySelectorAll('.row-total').forEach(function(input) {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById('grandTotal').innerText = '₹' + total.toFixed(2);
    }
});
</script>
{% endblock %}
